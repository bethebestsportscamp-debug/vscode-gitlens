<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Math Review Game – Host Board</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
    .top-bar { display:flex; align-items:center; justify-content:space-between; padding:14px 28px; background:rgba(0,0,0,.4); border-bottom:1px solid var(--card-border); flex-shrink:0; }
    .top-bar h1 { font-size:1.3rem; font-weight:800; letter-spacing:1px; color:var(--gold); }
    .q-counter { font-size:1rem; color:var(--muted); font-weight:600; }
    .main { display:flex; flex:1; gap:0; }
    .game-area { flex:1; display:flex; flex-direction:column; padding:28px 32px; gap:20px; }
    .question-box { padding:32px 40px; text-align:center; min-height:140px; display:flex; align-items:center; justify-content:center; flex-direction:column; }
    .unit-label { font-size:.75rem; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--gold); margin-bottom:14px; }
    .question-text { font-size:clamp(1.4rem, 3vw, 2.4rem); font-weight:700; line-height:1.6; letter-spacing:.3px; white-space:pre-wrap; }
    .question-media-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(170px, 1fr)); gap:14px; width:100%; margin-top:20px; }
    .question-media { width:100%; max-height:360px; object-fit:contain; background:#fff; border-radius:10px; padding:8px; border:1px solid rgba(255,255,255,.18); }
    .buzz-section { display:flex; flex-direction:column; gap:14px; }
    .buzz-header { display:flex; align-items:center; justify-content:space-between; gap:16px; }
    .who-buzzed { font-size:1.4rem; font-weight:800; display:flex; align-items:center; gap:12px; }
    .timer-label { font-size:2rem; font-weight:900; min-width:52px; text-align:right; }
    .answer-display { padding:20px 28px; font-size:clamp(1.2rem, 2.5vw, 2rem); font-weight:600; min-height:70px; display:flex; align-items:center; letter-spacing:.5px; border-left:4px solid var(--buzz); word-break:break-word; position:relative; }
    .answer-placeholder { color:var(--muted); font-style:italic; font-size:1.1rem; font-weight:400; }
    .typing-cursor { display:inline-block; width:2px; height:1.1em; background:currentColor; margin-left:3px; vertical-align:middle; animation:pulse .8s steps(1) infinite; }
    .animal-bubble { position:fixed; top:74px; left:50%; transform:translate(-50%, -18px) scale(.92); opacity:0; pointer-events:none; z-index:260; padding:10px 24px; border-radius:999px; background:rgba(0,0,0,.78); border:2px solid var(--gold); color:var(--gold); font-size:clamp(1.6rem, 4vw, 3.2rem); font-weight:900; letter-spacing:1px; box-shadow:0 16px 40px rgba(0,0,0,.35); }
    .animal-bubble.show { animation:animalPop 1.2s cubic-bezier(.22,1,.36,1) forwards; }
    .countdown-bubble { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none; z-index:240; opacity:0; color:#fff; font-size:clamp(5rem, 18vw, 13rem); font-weight:900; text-shadow:0 0 50px rgba(255,23,68,.85); }
    .countdown-bubble.show { animation:countdownPop .82s cubic-bezier(.22,1,.36,1) forwards; }
    @keyframes animalPop {
      0% { opacity:0; transform:translate(-50%, -18px) scale(.88) rotate(-2deg); }
      18% { opacity:1; transform:translate(-50%, 0) scale(1.1) rotate(1deg); }
      70% { opacity:1; transform:translate(-50%, 0) scale(1) rotate(0deg); }
      100% { opacity:0; transform:translate(-50%, -30px) scale(.94) rotate(2deg); }
    }
    @keyframes countdownPop {
      0% { opacity:0; transform:scale(.62); }
      18% { opacity:1; transform:scale(1.08); }
      68% { opacity:1; transform:scale(1); }
      100% { opacity:0; transform:scale(.86); }
    }
    .judge-row { display:flex; gap:14px; justify-content:center; }
    .verdict { display:none; position:fixed; inset:0; align-items:center; justify-content:center; font-size:clamp(4rem, 12vw, 9rem); font-weight:900; letter-spacing:4px; z-index:100; pointer-events:none; text-shadow:0 0 60px currentColor; }
    .verdict.show { display:flex; animation:zoomIn .4s cubic-bezier(.22,1,.36,1); }
    .verdict.correct { color:var(--correct); background:rgba(0,230,118,.08); }
    .verdict.wrong   { color:var(--wrong);   background:rgba(255,23,68,.08); }
    .verdict.steal   { color:var(--steal);   background:rgba(255,145,0,.08); }
    .steal-banner { padding:18px 28px; background:rgba(255,145,0,.15); border:2px solid var(--steal); border-radius:var(--radius); text-align:center; font-size:1.3rem; font-weight:700; color:var(--steal); display:none; }
    .steal-banner.show { display:block; animation:zoomIn .35s ease-out; }
    .lobby-panel { display:flex; flex-direction:column; gap:24px; max-width:680px; margin:0 auto; width:100%; padding-bottom:32px; }
    .lobby-panel h2 { font-size:1.5rem; font-weight:800; text-align:center; color:var(--gold); margin-top:8px; }
    .q-list { display:flex; flex-direction:column; gap:10px; max-height:340px; overflow-y:auto; }
    .q-item { display:flex; align-items:flex-start; gap:12px; padding:12px 16px; border-radius:10px; background:var(--card); border:1px solid var(--card-border); font-size:.9rem; }
    .q-item-num { color:var(--muted); font-weight:700; flex-shrink:0; min-width:24px; }
    .q-item-text { flex:1; font-weight:500; }
    .q-item-ans { color:var(--correct); font-size:.8rem; margin-top:2px; }
    .q-item-pts { color:var(--gold); font-size:.8rem; margin-top:2px; flex-shrink:0; }
    .q-item button { background:none; border:none; color:var(--wrong); cursor:pointer; font-size:1rem; flex-shrink:0; }
    .add-q-form { display:flex; flex-direction:column; gap:10px; }
    .add-q-form input, .add-q-form textarea { background:rgba(255,255,255,.06); border:1px solid var(--card-border); border-radius:8px; color:var(--text); padding:10px 14px; font-size:.95rem; font-family:inherit; resize:none; }
    .add-q-form input:focus, .add-q-form textarea:focus { outline:none; border-color:#5c6bc0; }
    .add-q-row { display:flex; gap:10px; }
    .add-q-row input { flex:1; }
    .sidebar { width:280px; flex-shrink:0; background:rgba(0,0,0,.3); border-left:1px solid var(--card-border); display:flex; flex-direction:column; padding:20px 16px; gap:18px; overflow-y:auto; }
    .sidebar h3 { font-size:.8rem; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--muted); border-bottom:1px solid var(--card-border); padding-bottom:8px; }
    .scoreboard { display:flex; flex-direction:column; gap:10px; }
    .score-row { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:10px; background:var(--card); border:1px solid var(--card-border); transition:border-color .3s; }
    .score-row.active-team { border-color:var(--buzz); background:rgba(124,77,255,.15); }
    .score-row .avatar { font-size:1.4rem; }
    .score-row .tname { flex:1; font-weight:700; font-size:.9rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .score-row .pts { font-size:1.1rem; font-weight:800; color:var(--gold); }
    .score-adj { display:flex; gap:4px; margin-left:4px; }
    .score-adj button { background:rgba(255,255,255,.1); border:none; border-radius:6px; color:var(--text); cursor:pointer; font-size:.85rem; padding:3px 7px; font-weight:700; }
    .score-adj button:hover { background:rgba(255,255,255,.2); }
    .dot-offline { width:8px; height:8px; border-radius:50%; background:#555; flex-shrink:0; }
    .dot-online { background:var(--correct); }
    .ctrl-row { display:flex; flex-direction:column; gap:8px; }
    .ctrl-row .btn { width:100%; }
    .game-over-panel { display:flex; flex-direction:column; align-items:center; gap:24px; padding:40px 20px; width:100%; }
    .game-over-panel h2 { font-size:3rem; font-weight:900; color:var(--gold); text-align:center; }
    .final-scores { display:flex; flex-direction:column; gap:14px; width:100%; max-width:540px; }
    .final-row { display:flex; align-items:center; gap:16px; padding:18px 24px; border-radius:14px; font-size:1.3rem; font-weight:800; }
    .final-row .rank { font-size:2rem; width:48px; text-align:center; }
    .final-row .f-avatar { font-size:2rem; }
    .final-row .f-name { flex:1; }
    .final-row .f-pts { color:var(--gold); font-size:1.5rem; }
    .waiting-msg { text-align:center; color:var(--muted); font-size:1.1rem; padding:40px; animation:pulse 2s ease-in-out infinite; }
    .correct-ans-reveal { background:rgba(0,230,118,.1); border:1px solid var(--correct); border-radius:10px; padding:12px 18px; font-size:1rem; color:var(--correct); font-weight:600; }
    .connection-status { position:fixed; bottom:12px; left:12px; padding:6px 12px; border-radius:20px; background:rgba(0,0,0,.7); font-size:.75rem; font-weight:700; letter-spacing:1px; text-transform:uppercase; z-index:200; }
    .connection-status.connected { color:var(--correct); border:1px solid var(--correct); }
    .connection-status.connecting { color:var(--gold); border:1px solid var(--gold); }
    .connection-status.error { color:var(--wrong); border:1px solid var(--wrong); }
    .setup-warning { padding:24px; max-width:680px; margin:40px auto; background:rgba(255,23,68,.1); border:2px solid var(--wrong); border-radius:var(--radius); color:var(--text); }
    .setup-warning h2 { color:var(--wrong); margin-bottom:12px; }
    .setup-warning code { background:rgba(0,0,0,.4); padding:2px 6px; border-radius:4px; font-family:monospace; }
  </style>
</head>
<body>

<div class="top-bar">
  <h1>⚡ MATH REVIEW GAME</h1>
  <span id="qCounter" class="q-counter"></span>
</div>

<div class="main">
  <div id="gameArea" class="game-area">
    <div id="lobbyView" class="lobby-panel" style="display:none">
      <h2>🎓 Game Setup</h2>
      <div class="card" style="padding:20px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
          <span style="font-weight:700">Question Bank <span id="qBankCount" style="color:var(--gold)"></span></span>
          <button class="btn btn-ghost" style="font-size:.8rem;padding:6px 12px" onclick="resetQBank()">Reset to Packet</button>
        </div>
        <div id="qList" class="q-list"></div>
      </div>
      <div class="card" style="padding:20px">
        <div style="font-weight:700;margin-bottom:12px">Add Custom Question</div>
        <div class="add-q-form">
          <textarea id="newQText" placeholder="Question text (you can use ² ³ √ etc.)" rows="2"></textarea>
          <div class="add-q-row">
            <input id="newQAns" placeholder="Answer" />
            <input id="newQPts" placeholder="Pts" type="number" value="100" style="width:90px;flex:none" />
          </div>
          <button class="btn btn-primary" onclick="addQuestion()">+ Add Question</button>
        </div>
      </div>
      <div style="display:flex;gap:12px;justify-content:center;margin-top:8px">
        <button id="startBtn" class="btn btn-gold btn-big" onclick="startGame()">🚀 Start Game!</button>
      </div>
    </div>

    <div id="questionView" style="display:none;flex-direction:column;gap:20px">
      <div id="questionBox" class="card question-box">
        <div id="unitLabel" class="unit-label"></div>
        <div id="questionText" class="question-text"></div>
        <div id="questionMedia" class="question-media-grid"></div>
      </div>
      <div id="buzzSection" class="buzz-section" style="display:none">
        <div class="buzz-header">
          <div id="whoBuzzed" class="who-buzzed"></div>
          <div id="timerLabel" class="timer-label"></div>
        </div>
        <div class="timer-wrap"><div id="timerBar" class="timer-bar"></div></div>
        <div id="answerDisplay" class="card answer-display">
          <span class="answer-placeholder">Waiting for team to type...</span>
        </div>
        <div id="judgeRow" class="judge-row" style="display:none">
          <button class="btn btn-success" style="font-size:1.2rem;padding:14px 36px" onclick="judge(true)">✓ CORRECT</button>
          <button class="btn btn-danger" style="font-size:1.2rem;padding:14px 36px" onclick="judge(false)">✗ WRONG</button>
        </div>
        <div id="correctAnsReveal" class="correct-ans-reveal" style="display:none"></div>
      </div>
      <div id="stealBanner" class="steal-banner">
        🔥 STEAL OPPORTUNITY! First team to buzz wins 30 seconds to answer!
        <span id="stealTimer" style="margin-left:12px;font-size:1.6rem"></span>
      </div>
      <div id="waitingMsg" class="waiting-msg">Waiting for a team to buzz in…</div>
    </div>

    <div id="gameOverView" class="game-over-panel" style="display:none">
      <h2>🏆 FINAL SCORES 🏆</h2>
      <div id="finalScores" class="final-scores"></div>
    </div>
  </div>

  <div class="sidebar">
    <h3>Teams</h3>
    <div id="scoreboard" class="scoreboard">
      <div style="color:var(--muted);font-size:.9rem;text-align:center">Waiting for teams…</div>
    </div>
    <h3>Controls</h3>
    <div class="ctrl-row" id="hostControls">
      <button id="skipBtn" class="btn btn-ghost" onclick="skipQuestion()" style="display:none">⏭ Skip Question</button>
      <button id="resetBtn" class="btn btn-danger" onclick="confirmReset()">↺ Reset Game</button>
    </div>
    <div id="answerKey" style="display:none">
      <h3>Answer Key</h3>
      <div id="answerKeyText" style="font-size:.95rem;color:var(--correct);font-weight:600;padding:8px;background:rgba(0,230,118,.08);border-radius:8px;border:1px solid rgba(0,230,118,.3)"></div>
    </div>
  </div>
</div>

<div id="verdictOverlay" class="verdict"></div>
<div id="animalBubble" class="animal-bubble"></div>
<div id="countdownBubble" class="countdown-bubble"></div>
<div id="connStatus" class="connection-status connecting">Connecting…</div>

<script src="sounds.js"></script>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getDatabase, ref, set, update, onValue, runTransaction, get, onDisconnect, serverTimestamp }
  from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';
import { firebaseConfig } from './firebase-config.js';

// ── Config validation ────────────────────────────────────────────────────────
if (!firebaseConfig.databaseURL || firebaseConfig.databaseURL.includes('REPLACE') || firebaseConfig.databaseURL.includes('YOUR-PROJECT-ID')) {
  document.body.innerHTML = `
    <div class="setup-warning">
      <h2>⚠️ Firebase not configured</h2>
      <p>Edit <code>public/firebase-config.js</code> and paste in your Firebase project's config values, then redeploy.</p>
      <p style="margin-top:10px">See <code>SETUP.md</code> for the step-by-step.</p>
    </div>`;
  throw new Error('Firebase config not set');
}

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

// ── Constants (Algebra Final Review — shuffled across units) ─────────────────
const FALLBACK_QUESTIONS = [
  { text: 'Packet question bank did not load. Refresh the host page.', answer: 'Teacher check', points: 100, unit: 'Setup' },
];
let defaultQuestions = FALLBACK_QUESTIONS;

async function loadDefaultQuestions() {
  try {
    const res = await fetch('./packet-questions.json', { cache: 'no-store' });
    if (!res.ok) throw new Error(`Question bank HTTP ${res.status}`);
    const loaded = await res.json();
    if (!Array.isArray(loaded) || loaded.length === 0) throw new Error('Question bank is empty');
    defaultQuestions = loaded;
  } catch (e) {
    console.error('Question bank load failed', e);
    defaultQuestions = FALLBACK_QUESTIONS;
  }
}
const ANSWER_MS = 90000;
const STEAL_MS  = 10000;
const STEAL_ANSWER_MS = 30000;
const VERDICT_PAUSE_MS = 1800;

// ── State ────────────────────────────────────────────────────────────────────
const stateRef = ref(db, 'game/state');
const teamsRef = ref(db, 'game/teams');
const questionsRef = ref(db, 'game/questions');

let gameState = null;
let teams = {};
let questions = [];
let timerInterval = null;
let lastBeepSec = null;
let lastTimerEnd = 0;
let lastBuzzTs = 0;
let lastVerdictTs = 0;
let phaseTimer = null;
const CONFETTI = ['🎉','⭐','✨','🌟','💫','🎊','🏆','🎯'];

// Unlock audio on first click
document.addEventListener('click', () => getCtx(), { once: true });

// ── Init: ensure game exists ─────────────────────────────────────────────────
async function initGameIfMissing() {
  const snap = await get(ref(db, 'game'));
  if (!snap.exists()) {
    await set(ref(db, 'game'), {
      state: {
        phase: 'lobby', qIndex: 0, currentAnswer: '', activeBuzzTeam: null,
        buzzedTeams: {}, timerEnd: 0, isSteal: false,
        currentQ: null, lastBuzzTs: 0, lastVerdictTs: 0, lastVerdict: null,
      },
      questions: defaultQuestions,
      teams: {},
    });
  }
}

// ── Subscriptions ────────────────────────────────────────────────────────────
function subscribe() {
  onValue(stateRef, (snap) => {
    gameState = snap.val() || {};
    handleVerdictSounds();
    handleBuzzSound();
    render();
    armPhaseTimer();
  });
  onValue(teamsRef, (snap) => {
    teams = snap.val() || {};
    renderScoreboard();
  });
  onValue(questionsRef, (snap) => {
    questions = snap.val() || [];
    if (gameState?.phase === 'lobby') renderLobby();
  });

  // Connection status
  onValue(ref(db, '.info/connected'), (snap) => {
    const el = document.getElementById('connStatus');
    if (snap.val()) { el.textContent = 'Connected'; el.className = 'connection-status connected'; }
    else { el.textContent = 'Reconnecting…'; el.className = 'connection-status connecting'; }
  });
}

function handleBuzzSound() {
  if (!gameState) return;
  const ts = gameState.lastBuzzTs || 0;
  if (ts > lastBuzzTs && lastBuzzTs > 0) {
    const animal = Sounds.animalBuzz();
    showAnimalCall(animal);
    buzzFlash(gameState.activeBuzzTeam);
  }
  lastBuzzTs = ts;
}

function handleVerdictSounds() {
  if (!gameState) return;
  const v = gameState.lastVerdict;
  const ts = gameState.lastVerdictTs || 0;
  if (!v || ts <= lastVerdictTs) { lastVerdictTs = Math.max(lastVerdictTs, ts); return; }
  if (lastVerdictTs > 0) {
    if (v.type === 'correct') { Sounds.fanfare(); Sounds.cheer(); showVerdict('correct', `✓ CORRECT  +${v.points}`); spawnConfetti(); }
    if (v.type === 'wrong')   { Sounds.sadTrombone(); showVerdict('wrong', '✗ WRONG'); }
    if (v.type === 'timeout') { Sounds.timeoutHorn(); showVerdict('wrong', "TIME'S UP"); }
    if (v.type === 'no_steal'){ Sounds.deflate(); showVerdict('steal', 'NO STEAL', 1500); }
    if (v.type === 'steal_start'){ Sounds.gooseHonk(); }
    if (v.type === 'game_over'){ setTimeout(() => Sounds.elephant(), 300); }
  }
  lastVerdictTs = ts;
}

// ── Phase timer (host is authority) ──────────────────────────────────────────
function armPhaseTimer() {
  clearTimeout(phaseTimer);
  if (!gameState || !gameState.timerEnd) return;
  if (!['answering','steal'].includes(gameState.phase)) return;
  const remaining = gameState.timerEnd - Date.now();
  if (remaining <= 0) { onTimerExpire(); return; }
  phaseTimer = setTimeout(onTimerExpire, remaining + 50);
}

async function onTimerExpire() {
  const s = gameState;
  if (!s) return;
  if (s.phase === 'answering') {
    await emitVerdict('timeout', { teamId: s.activeBuzzTeam });
    setTimeout(() => { if (s.isSteal) advanceAfterNoSteal(); else startSteal(); }, VERDICT_PAUSE_MS);
  } else if (s.phase === 'steal') {
    await emitVerdict('no_steal');
    setTimeout(nextQuestion, 1500);
  }
}

// ── Mutations ────────────────────────────────────────────────────────────────
async function emitVerdict(type, extra = {}) {
  await update(stateRef, { lastVerdict: { type, ...extra }, lastVerdictTs: Date.now() });
}

async function nextQuestion() {
  const s = gameState;
  if (!s) return;
  const nextIdx = (s.qIndex ?? 0) + 1;
  if (nextIdx >= questions.length) {
    await update(stateRef, { phase: 'game_over', currentQ: null, timerEnd: 0, lastVerdict: { type:'game_over' }, lastVerdictTs: Date.now() });
    return;
  }
  await update(stateRef, {
    phase: 'question',
    qIndex: nextIdx,
    currentQ: questions[nextIdx],
    currentAnswer: '',
    activeBuzzTeam: null,
    buzzedTeams: {},
    isSteal: false,
    timerEnd: 0,
  });
}

async function startSteal() {
  const s = gameState;
  if (!s) return;
  const eligible = Object.keys(teams).filter(id => !(s.buzzedTeams || {})[id]);
  if (eligible.length === 0) {
    await emitVerdict('no_steal');
    setTimeout(nextQuestion, 1500);
    return;
  }
  await update(stateRef, {
    phase: 'steal', activeBuzzTeam: null, currentAnswer: '',
    isSteal: true, timerEnd: Date.now() + STEAL_MS,
    lastVerdict: { type: 'steal_start' }, lastVerdictTs: Date.now(),
  });
}

async function advanceAfterNoSteal() {
  await emitVerdict('no_steal');
  setTimeout(nextQuestion, 1200);
}

window.judge = async (correct) => {
  const s = gameState;
  if (!s || s.phase !== 'judging') return;
  const teamId = s.activeBuzzTeam;
  if (!teamId) return;
  if (correct) {
    const pts = s.currentQ?.points || 0;
    await runTransaction(ref(db, `game/teams/${teamId}/score`), (cur) => (cur || 0) + pts);
    await emitVerdict('correct', { teamId, points: pts });
    setTimeout(nextQuestion, 2200);
  } else {
    await emitVerdict('wrong', { teamId });
    const wasSteal = s.isSteal;
    setTimeout(() => { if (wasSteal) advanceAfterNoSteal(); else startSteal(); }, VERDICT_PAUSE_MS);
  }
};

window.startGame = async () => {
  if (!gameState || gameState.phase !== 'lobby') return;
  if (!questions || questions.length === 0) { alert('Add at least one question first!'); return; }
  const teamCount = Object.keys(teams).length;
  if (teamCount === 0 && !confirm('No teams have joined yet. Start anyway?')) return;
  await update(stateRef, {
    phase: 'question', qIndex: 0, currentQ: questions[0],
    currentAnswer: '', activeBuzzTeam: null, buzzedTeams: {},
    isSteal: false, timerEnd: 0,
  });
};

window.addQuestion = async () => {
  const text = document.getElementById('newQText').value.trim();
  const answer = document.getElementById('newQAns').value.trim();
  const points = parseInt(document.getElementById('newQPts').value) || 100;
  if (!text || !answer) { alert('Please enter both question and answer.'); return; }
  if (gameState && gameState.phase !== 'lobby') return;
  const next = [...questions, { text, answer, points }];
  await set(questionsRef, next);
  document.getElementById('newQText').value = '';
  document.getElementById('newQAns').value = '';
  document.getElementById('newQPts').value = '100';
};

window.removeQuestion = async (i) => {
  if (gameState && gameState.phase !== 'lobby') return;
  const next = questions.filter((_, idx) => idx !== i);
  await set(questionsRef, next);
};

window.resetQBank = async () => {
  if (gameState && gameState.phase !== 'lobby') return;
  if (!confirm('Reset to the Final Review Packet 2026 questions? This will remove any custom questions.')) return;
  await set(questionsRef, defaultQuestions);
};

window.skipQuestion = async () => {
  if (!gameState || !['question','answering','judging','steal'].includes(gameState.phase)) return;
  clearTimeout(phaseTimer);
  nextQuestion();
};

window.adjustScore = async (teamId, delta) => {
  await runTransaction(ref(db, `game/teams/${teamId}/score`), (cur) => (cur || 0) + delta);
};

window.confirmReset = async () => {
  if (!confirm('Reset the game? Scores will be cleared and everyone returns to lobby.')) return;
  const updates = {};
  Object.keys(teams).forEach(id => { updates[`game/teams/${id}/score`] = 0; });
  updates['game/state'] = {
    phase: 'lobby', qIndex: 0, currentAnswer: '', activeBuzzTeam: null,
    buzzedTeams: {}, isSteal: false, timerEnd: 0, currentQ: null,
    lastBuzzTs: 0, lastVerdictTs: 0, lastVerdict: null,
  };
  await update(ref(db), updates);
};

// ── Rendering (mostly unchanged from server-based version) ───────────────────
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function questionImages(q) {
  if (!q) return [];
  const imgs = Array.isArray(q.images) ? q.images : (q.image ? [q.image] : []);
  return imgs.filter(Boolean);
}

function questionAnswer(q) {
  return q?.answer || 'Teacher check';
}

function renderQuestionMedia(q) {
  const el = document.getElementById('questionMedia');
  const imgs = questionImages(q);
  if (!imgs.length) {
    el.innerHTML = '';
    el.style.display = 'none';
    return;
  }
  el.style.display = 'grid';
  el.innerHTML = imgs.map((src, i) => `<img class="question-media" src="${esc(src)}" alt="Question visual ${i + 1}">`).join('');
}

function render() {
  const s = gameState;
  if (!s) return;
  document.getElementById('qCounter').textContent =
    (s.phase && !['lobby','game_over'].includes(s.phase))
      ? `Question ${(s.qIndex ?? 0) + 1} / ${questions.length}` : '';

  document.getElementById('lobbyView').style.display    = s.phase === 'lobby' ? 'flex' : 'none';
  document.getElementById('questionView').style.display = ['question','answering','judging','steal'].includes(s.phase) ? 'flex' : 'none';
  document.getElementById('gameOverView').style.display = s.phase === 'game_over' ? 'flex' : 'none';
  document.getElementById('skipBtn').style.display      = ['question','steal','judging','answering'].includes(s.phase) ? 'block' : 'none';
  document.getElementById('answerKey').style.display    = s.currentQ ? 'block' : 'none';
  if (s.currentQ) document.getElementById('answerKeyText').textContent = '→ ' + questionAnswer(s.currentQ);

  if (s.phase === 'lobby') renderLobby();
  if (['question','answering','judging','steal'].includes(s.phase)) renderQuestion();
  if (s.phase === 'game_over') renderGameOver();
}

function renderLobby() {
  document.getElementById('qBankCount').textContent = `(${questions.length})`;
  const list = document.getElementById('qList');
  if (!questions.length) {
    list.innerHTML = '<div style="color:var(--muted);text-align:center;padding:12px">No questions yet.</div>';
    return;
  }
  list.innerHTML = questions.map((q, i) => `
    <div class="q-item">
      <span class="q-item-num">${i + 1}.</span>
      <div style="flex:1">
        ${q.unit ? `<div style="font-size:.7rem;color:var(--gold);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px">${esc(q.unit)}</div>` : ''}
        <div class="q-item-text" style="white-space:pre-wrap">${esc(q.text)}</div>
        <div class="q-item-ans">✓ ${esc(questionAnswer(q))}</div>
        ${questionImages(q).length ? `<div class="q-item-ans" style="color:var(--muted)">Visuals: ${questionImages(q).length}</div>` : ''}
      </div>
      <span class="q-item-pts">${q.points}pts</span>
      <button onclick="removeQuestion(${i})" title="Remove">✕</button>
    </div>`).join('');
}

function renderQuestion() {
  const s = gameState;
  if (!s.currentQ) return;
  document.getElementById('unitLabel').textContent = s.currentQ.unit || '';
  document.getElementById('questionText').textContent = s.currentQ.text;
  renderQuestionMedia(s.currentQ);

  const buzzSec = document.getElementById('buzzSection');
  const waitMsg = document.getElementById('waitingMsg');
  const stealBan = document.getElementById('stealBanner');
  const judgeRow = document.getElementById('judgeRow');
  const revealDiv = document.getElementById('correctAnsReveal');

  buzzSec.style.display = ['answering','judging','steal'].includes(s.phase) ? 'flex' : 'none';
  waitMsg.style.display = s.phase === 'question' ? 'block' : 'none';
  stealBan.classList.toggle('show', s.phase === 'steal');
  judgeRow.style.display = s.phase === 'judging' ? 'flex' : 'none';
  revealDiv.style.display = s.phase === 'judging' ? 'block' : 'none';
  if (s.phase === 'judging') revealDiv.textContent = '📖 Correct Answer: ' + questionAnswer(s.currentQ);

  if (['answering','judging'].includes(s.phase) && s.activeBuzzTeam) {
    const team = teams[s.activeBuzzTeam];
    if (team) {
      const badge = `<span style="color:${team.color}">${team.avatar} ${esc(team.name)}</span>`;
      document.getElementById('whoBuzzed').innerHTML = s.isSteal ? `🔥 STEAL: ${badge}` : `${badge} BUZZED IN!`;
    }
  }
  renderAnswer();
  renderTimer();
}

function renderAnswer() {
  const s = gameState;
  const el = document.getElementById('answerDisplay');
  if (s.currentAnswer) {
    el.innerHTML = esc(s.currentAnswer) + (s.phase === 'answering' ? '<span class="typing-cursor"></span>' : '');
    el.style.color = 'var(--text)';
  } else {
    el.innerHTML = '<span class="answer-placeholder">Waiting for team to type…</span>';
  }
}

function renderTimer() {
  clearInterval(timerInterval);
  const s = gameState;
  if (!s.timerEnd) {
    hideCountdown();
    return;
  }
  const totalMs = s.phase === 'steal' ? STEAL_MS : (s.isSteal ? STEAL_ANSWER_MS : ANSWER_MS);
  const timerLabel = document.getElementById('timerLabel');
  const timerBar = document.getElementById('timerBar');
  const stealTimer = document.getElementById('stealTimer');
  if (lastTimerEnd !== s.timerEnd) {
    lastBeepSec = null;
    lastTimerEnd = s.timerEnd;
  }

  function tick() {
    const remaining = Math.max(0, s.timerEnd - Date.now());
    const secs = Math.ceil(remaining / 1000);
    const pct = (remaining / totalMs) * 100;
    timerLabel.textContent = secs + 's';
    stealTimer.textContent = secs + 's';
    const hue = pct * 1.2;
    timerBar.style.width = pct + '%';
    timerBar.style.background = `hsl(${hue}, 90%, 55%)`;
    timerLabel.style.color = `hsl(${hue}, 90%, 70%)`;
    if (s.phase === 'answering' && secs <= 10 && secs > 0 && secs !== lastBeepSec) {
      lastBeepSec = secs;
      showCountdownTick(secs);
      Sounds.timerBeep(secs <= 3);
    }
    if (remaining === 0) clearInterval(timerInterval);
  }
  tick();
  timerInterval = setInterval(tick, 250);
}

function renderScoreboard() {
  const s = gameState || {};
  const list = Object.values(teams);
  const el = document.getElementById('scoreboard');
  if (!list.length) {
    el.innerHTML = '<div style="color:var(--muted);font-size:.9rem;text-align:center">Waiting for teams…</div>';
    return;
  }
  const sorted = [...list].sort((a,b) => (b.score||0) - (a.score||0));
  el.innerHTML = sorted.map(t => `
    <div class="score-row ${t.id === s.activeBuzzTeam ? 'active-team' : ''}" style="border-color:${t.id === s.activeBuzzTeam ? t.color : 'var(--card-border)'}">
      <span class="dot-offline ${t.connected !== false ? 'dot-online' : ''}"></span>
      <span class="avatar">${t.avatar}</span>
      <span class="tname" style="color:${t.color}">${esc(t.name)}</span>
      <span class="pts">${t.score || 0}</span>
      <div class="score-adj">
        <button onclick="adjustScore('${t.id}', 100)" title="+100">+</button>
        <button onclick="adjustScore('${t.id}', -100)" title="-100">−</button>
      </div>
    </div>`).join('');
}

function renderGameOver() {
  const sorted = Object.values(teams).sort((a,b) => (b.score||0) - (a.score||0));
  const medals = ['🥇','🥈','🥉','4️⃣','5️⃣'];
  document.getElementById('finalScores').innerHTML = sorted.map((t, i) => `
    <div class="final-row card" style="border-color:${t.color};background:${i===0?'rgba(255,215,0,.1)':'var(--card)'}">
      <span class="rank">${medals[i] || (i+1)}</span>
      <span class="f-avatar">${t.avatar}</span>
      <span class="f-name" style="color:${t.color}">${esc(t.name)}</span>
      <span class="f-pts">${t.score || 0} pts</span>
    </div>`).join('');
  spawnConfetti(); spawnConfetti();
}

function showVerdict(type, text, duration = 2000) {
  const el = document.getElementById('verdictOverlay');
  el.className = 'verdict show ' + type;
  el.textContent = text;
  setTimeout(() => { el.className = 'verdict'; el.textContent = ''; }, duration);
}

function buzzFlash(teamId) {
  const team = teams[teamId];
  if (!team) return;
  document.body.style.outline = `6px solid ${team.color}`;
  setTimeout(() => { document.body.style.outline = ''; }, 600);
}

function showAnimalCall(animal) {
  const el = document.getElementById('animalBubble');
  if (!el || !animal) return;
  el.textContent = `${animal.emoji} ${animal.call}`;
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
}

function showCountdownTick(sec) {
  const el = document.getElementById('countdownBubble');
  if (!el) return;
  el.textContent = sec;
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
}

function hideCountdown() {
  const el = document.getElementById('countdownBubble');
  if (!el) return;
  el.classList.remove('show');
  el.textContent = '';
}

function spawnConfetti() {
  for (let i = 0; i < 12; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.textContent = CONFETTI[Math.floor(Math.random() * CONFETTI.length)];
      el.style.left = Math.random() * 100 + 'vw';
      el.style.bottom = '0';
      el.style.animationDuration = (.8 + Math.random() * .8) + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 2000);
    }, i * 80);
  }
}

// ── Boot ─────────────────────────────────────────────────────────────────────
(async () => {
  try {
    await loadDefaultQuestions();
    await initGameIfMissing();
    subscribe();
  } catch (e) {
    console.error(e);
    const el = document.getElementById('connStatus');
    el.textContent = 'Error: ' + (e?.message || 'connection failed');
    el.className = 'connection-status error';
  }
})();
</script>
